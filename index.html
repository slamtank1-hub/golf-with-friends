<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10140f">
  <title>김장채권 골프여행</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10140f;
      --panel: #171d15;
      --panel-2: #20281c;
      --line: rgba(255,255,255,.13);
      --text: #f5f3e8;
      --muted: #aeb9a6;
      --green: #9bd85d;
      --deep-green: #315c2b;
      --yellow: #f7c948;
      --orange: #ff995d;
      --red: #ff5d5d;
      --blue: #73c8ff;
      --shadow: 0 18px 48px rgba(0,0,0,.34);
      --radius: 8px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(155, 216, 93, .16), transparent 34rem),
        linear-gradient(180deg, #11170f 0%, var(--bg) 42%, #0b0f0a 100%);
      color: var(--text);
      overflow: hidden;
    }

    button {
      font: inherit;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100vw, 520px);
      height: 100dvh;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      border-inline: 1px solid rgba(255,255,255,.06);
      background: rgba(10,14,9,.68);
    }

    .deck {
      height: 100%;
      display: flex;
      transition: transform .28s ease;
      touch-action: pan-y;
    }

    .slide {
      min-width: 100%;
      height: 100%;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: max(14px, env(safe-area-inset-top)) 14px 92px;
      scrollbar-width: none;
    }

    .slide::-webkit-scrollbar { display: none; }

    .topbar {
      position: relative;
      z-index: 1;
      margin: 0 0 12px;
      padding: 10px;
      background: linear-gradient(180deg, rgba(16,20,15,.98), rgba(16,20,15,.86));
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
    }

    .course-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
    }

    .course-title small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .brand-line {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 8px;
      background: rgba(255,255,255,.055);
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
    }

    .course-title strong {
      display: block;
      font-size: 16px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .hole-nav {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      gap: 5px;
    }

    .dot {
      height: 34px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      background: rgba(255,255,255,.05);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .dot.active {
      background: var(--green);
      border-color: var(--green);
      color: #15210f;
    }

    .hero {
      min-height: calc(100dvh - 108px);
      display: grid;
      align-content: center;
      gap: 18px;
    }

    .hero-card,
    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.045));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(155,216,93,.18), transparent 44%, rgba(115,200,255,.12));
      pointer-events: none;
    }

    .hero-content { position: relative; }

    .cover-title {
      display: grid;
      gap: 8px;
      text-align: center;
    }

    .cover-title h1 {
      font-size: clamp(32px, 10vw, 48px);
      line-height: 1.08;
    }

    .cover-title strong {
      display: block;
      color: #eaf5df;
      font-size: 18px;
      line-height: 1.35;
      word-break: keep-all;
    }

    .cover-photo-slot {
      min-height: 220px;
      display: grid;
      place-items: center;
      margin: 22px 0;
      border: 1px dashed rgba(245,243,232,.38);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(155,216,93,.14), rgba(115,200,255,.1)),
        rgba(0,0,0,.2);
      text-align: center;
    }

    .cover-photo-slot b {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 18px;
    }


    .cover-photo-slot img {
      display: block;
      width: 100%;
      max-width: 100%;
      max-height: min(70dvh, 720px);
      object-fit: contain;
      border-radius: 8px;
    }
    .cover-photo-slot span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .cover-schedule {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .cover-row {
      display: grid;
      grid-template-columns: 64px 1fr;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 8px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.08);
    }

    .cover-row b {
      color: var(--green);
      font-size: 13px;
    }

    .cover-row span {
      color: #f3f0df;
      font-size: 15px;
      font-weight: 850;
      word-break: keep-all;
    }

    .eyebrow {
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      margin: 0 0 12px;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(34px, 11vw, 52px);
      line-height: .96;
      letter-spacing: 0;
    }

    .hero-copy {
      margin-top: 18px;
      color: #dfe8d6;
      font-size: 16px;
      line-height: 1.55;
      word-break: keep-all;
    }

    .promise-grid {
      display: grid;
      gap: 8px;
      margin-top: 20px;
    }

    .promise {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      color: #ecf5e4;
      font-size: 14px;
      font-weight: 750;
    }

    .number-mark {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--green);
      color: #16230f;
      font-size: 12px;
      font-weight: 950;
    }

    .hole-head {
      display: grid;
      gap: 12px;
    }

    .hole-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .hole-kicker {
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
    }

    .hole-title {
      margin-top: 3px;
      font-size: 30px;
      line-height: 1;
      letter-spacing: 0;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .quick-card {
      margin-top: 12px;
      padding: 14px;
      background: linear-gradient(135deg, rgba(155,216,93,.2), rgba(255,255,255,.055));
      border: 1px solid rgba(155,216,93,.32);
      border-radius: var(--radius);
    }

    .quick-label {
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
    }

    .quick-text {
      margin-top: 4px;
      font-size: 20px;
      line-height: 1.28;
      font-weight: 900;
      word-break: keep-all;
    }

    .danger-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .danger,
    .safe {
      padding: 10px;
      border-radius: 8px;
      min-height: 70px;
    }

    .danger {
      background: rgba(255,93,93,.12);
      border: 1px solid rgba(255,93,93,.35);
    }

    .safe {
      background: rgba(155,216,93,.11);
      border: 1px solid rgba(155,216,93,.28);
    }

    .box-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .box-value {
      font-size: 14px;
      line-height: 1.35;
      font-weight: 850;
      word-break: keep-all;
    }

    .media-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin: 14px 0 8px;
    }

    .tab {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.055);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .tab.active {
      background: #f2f0dc;
      color: #1c2417;
      border-color: #f2f0dc;
    }

    .image-panel {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: #f4f4ee;
      border: 1px solid rgba(255,255,255,.12);
      cursor: zoom-in;
    }

    .image-panel img {
      display: block;
      width: 100%;
      max-height: 72dvh;
      object-fit: contain;
      background: #f4f4ee;
    }

    .image-panel.summary img {
      max-height: 78dvh;
    }

    .image-caption {
      position: absolute;
      left: 8px;
      bottom: 8px;
      max-width: calc(100% - 16px);
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(15,19,13,.78);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      backdrop-filter: blur(10px);
    }

    .panel {
      margin-top: 12px;
      padding: 14px;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .panel-title h3 {
      font-size: 15px;
      letter-spacing: 0;
    }

    .tips {
      display: grid;
      gap: 8px;
    }

    .tip {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 8px;
      padding: 9px 0;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .tip:first-child { border-top: 0; padding-top: 0; }

    .tip b {
      color: var(--green);
      font-size: 12px;
    }

    .tip span {
      color: #e8eee0;
      font-size: 14px;
      line-height: 1.42;
      word-break: keep-all;
    }

    .friends {
      display: grid;
      gap: 8px;
    }

    .friend {
      padding: 10px;
      border-radius: 8px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.08);
    }
    .friend span {
      color: #f3f0df;
      font-size: 14px;
      line-height: 1.4;
      word-break: keep-all;
    }
    .image-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.84);
    }

    .image-modal.open {
      display: flex;
    }

    .image-modal img {
      max-width: 100%;
      max-height: 88dvh;
      border-radius: var(--radius);
      background: #f4f4ee;
      object-fit: contain;
    }

    .image-modal button {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      right: 12px;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px;
      background: rgba(255,255,255,.12);
      color: #fff;
      font-size: 22px;
      font-weight: 900;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 46px 1fr 46px;
      gap: 7px;
      padding: 8px 12px max(8px, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(16,20,15,0), rgba(16,20,15,.92) 22%, rgba(16,20,15,.98));
      pointer-events: none;
    }

    .nav-btn,
    .current-chip {
      height: 42px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-weight: 950;
      pointer-events: auto;
    }

    .nav-btn {
      font-size: 20px;
    }

    .nav-btn:disabled {
      opacity: .35;
    }

    .current-chip {
      display: grid;
      place-items: center;
      background: rgba(155,216,93,.16);
      color: #eaf8df;
      font-size: 13px;
    }

    .ending {
      min-height: calc(100dvh - 112px);
      display: grid;
      align-content: center;
      gap: 12px;
    }

    .ending .hero-card {
      background: linear-gradient(180deg, rgba(247,201,72,.12), rgba(255,255,255,.05));
    }

    .small-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    .course-brief {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .brief-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .brief-box {
      min-height: 92px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      background: rgba(0,0,0,.2);
    }

    .brief-box b {
      display: block;
      color: var(--green);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .brief-box span {
      color: #ecf3e6;
      font-size: 12px;
      line-height: 1.38;
      word-break: keep-all;
    }

    .course-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
      gap: 5px;
      margin-top: 8px;
    }

    .course-btn {
      min-height: 32px;
      border: 1px solid rgba(155,216,93,.28);
      border-radius: 8px;
      background: rgba(155,216,93,.11);
      color: #edf8e4;
      font-size: 11px;
      font-weight: 900;
      padding: 4px 5px;
    }

    .hole-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .hole-mini {
      min-height: 84px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      background: rgba(255,255,255,.055);
      text-align: left;
    }

    .hole-mini b {
      display: block;
      color: var(--yellow);
      font-size: 13px;
      margin-bottom: 5px;
    }

    .hole-mini span {
      display: block;
      color: #dce7d4;
      font-size: 12px;
      line-height: 1.35;
      word-break: keep-all;
    }

    .placeholder-map {
      min-height: 260px;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        linear-gradient(155deg, rgba(155,216,93,.18), rgba(115,200,255,.11)),
        repeating-linear-gradient(135deg, rgba(255,255,255,.055) 0 10px, transparent 10px 20px),
        #182116;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      text-align: center;
    }

    .placeholder-map b {
      display: block;
      margin-bottom: 8px;
      font-size: 22px;
      color: var(--text);
    }

    .placeholder-map span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      word-break: keep-all;
    }

    @media (min-width: 760px) {
      body {
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: auto;
      }

      .app {
        height: min(920px, calc(100vh - 48px));
        border-radius: 18px;
        box-shadow: 0 24px 80px rgba(0,0,0,.45);
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="김장채권 골프여행">
    <section class="deck" id="deck"></section>
    <nav class="bottom-nav" aria-label="슬라이드 이동">
      <button class="nav-btn" id="prevBtn" type="button" aria-label="이전">‹</button>
      <div class="current-chip" id="currentChip">OPENING</div>
      <button class="nav-btn" id="nextBtn" type="button" aria-label="다음">›</button>
    </nav>
  </main>

  <div class="image-modal" id="imageModal" aria-hidden="true">
    <button type="button" id="imageModalClose" aria-label="닫기">×</button>
    <img id="imageModalImg" alt="">
  </div>

  <script type="text/plain" id="legacy-inline-script">
    const ASSET = "assets/oak/";
    const itinerary = [
      { date: "6월 4일", courses: ["Pine", "Maple"], note: "첫날은 방향성 확인과 체력 아끼기" },
      { date: "6월 5일", courses: ["Oak", "Cherry"], note: "둘째 날은 오르막/내리막 보정과 집중력" }
    ];

    const courseInfo = {
      Pine: {
        ko: "파인", day: "6월 4일 오전", theme: "소나무 숲 · 물길 · 전략형",
        difficulty: "상", style: "연못과 계류가 많은 편으로 알려진 전략형 코스",
        watch: "티샷보다 세컨샷 위치가 중요. 물과 숲을 동시에 의식하면 스윙이 급해짐.",
        play: "첫 라운드 시작 코스로 가정하고, 보기 전략과 페어웨이 우선 운영.",

      },
      Maple: {
        ko: "메이플", day: "6월 4일 오후", theme: "단풍나무 · 리듬 · 체력 관리",
        difficulty: "중상", style: "오크와 함께 대회 코스로 쓰인 이력이 있는 18홀 조합의 한 축",
        watch: "오후 라운드라 체력 저하와 집중력 하락 주의. 무리한 장타보다 반복 가능한 방향.",
        play: "티샷 루틴을 짧게 고정하고, 그린 중앙 공략으로 더블 보기 방지.",
        note: "이미지 준비 전이라 코스 브리핑과 홀 체크리스트 중심"
      },
      Oak: {
        ko: "오크", day: "6월 5일 오전", theme: "참나무 숲 · 고도 변화 · 정교한 보정",
        difficulty: "상", style: "현재 이미지가 준비된 메인 야디지북 코스",
        watch: "오르막/내리막 차이가 크게 느껴지는 홀들이 있어 평지 거리만 믿으면 위험.",
        play: "200m 기준 랜딩존, 고도 보정, 그린 경사를 함께 확인.",
        note: "코스도, 경사도, 그린 이미지를 홀별로 제공"
      },
      Cherry: {
        ko: "체리", day: "6월 5일 오후", theme: "벚나무 · 리노베이션 · 공격과 방어",
        difficulty: "중상", style: "리노베이션 이후 랜딩 에어리어가 넓어졌다는 공개 설명이 있음",
        watch: "마지막 코스라 체력과 멘탈이 변수. 넓어 보여도 위험 구역 앞에서는 끊어가기.",
        play: "좋은 스코어보다 큰 사고 없는 마무리. 물, 벙커, 숲 중 하나만 확실히 피하기.",
        note: "이미지 준비 전이라 코스 브리핑과 홀 체크리스트 중심"
      }
    };

              <div class="hero-content">
                <p class="eyebrow">Round Complete</p>
                <h1>오늘의 승자는<br>끝까지 웃은 사람</h1>
                <p class="hero-copy">스코어는 잠깐이고, 이 여행은 오래 간다. 나중에 사진과 결과를 더해 완성판으로 보내면 진짜 기념품이 된다.</p>
                <div class="promise-grid">
                  <div class="promise"><span class="number-mark">A</span><span>베스트 샷은 기억하고</span></div>
                  <div class="promise"><span class="number-mark">B</span><span>최악의 샷은 더 오래 기억하고</span></div>
                  <div class="promise"><span class="number-mark">C</span><span>저녁에는 모두가 싱글</span></div>
                </div>
              </div>
            </div>
            <p class="small-note">오크밸리 CC · 김장채권 골프여행 프로토타입</p>
          </div>
        </article>
      `;
    }

    function slideHtml(slide) {
      if (slide.type === "opening") return openingSlide();
      if (slide.type === "itinerary") return itinerarySlide();
      if (slide.type === "course") return courseSlide(slide.course);
      if (slide.type === "oakHole") return oakHoleSlide(oakHoles[slide.hole - 1]);
      if (slide.type === "genericHole") return genericHoleSlide(slide.course, slide.hole);
      return endingSlide();
    }

    function findCourseIndex(course) {
      return slides.findIndex(slide => slide.type === "course" && slide.course === course);
    }

    function findCourseHoleIndex(course, hole) {
      return slides.findIndex(slide => (slide.type === "oakHole" || slide.type === "genericHole") && slide.course === course && slide.hole === hole);
    }

    function render() {
      deck.innerHTML = slides.map(slideHtml).join("");
      deck.style.transform = `translateX(${-current * 100}%)`;
      const active = slides[current];
      currentChip.textContent = active.type === "opening" ? "OPENING" : active.type === "ending" ? "FINISH" : active.type === "itinerary" ? "SCHEDULE" : active.type === "course" ? `${courseInfo[active.course].ko} COURSE` : `${courseInfo[active.course].ko} H${active.hole}`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === slides.length - 1;
      document.querySelectorAll("[data-jump]").forEach(btn => {
        btn.addEventListener("click", () => go(Number(btn.dataset.jump)));
      });
      document.querySelectorAll("[data-course]").forEach(btn => {
        btn.addEventListener("click", () => go(findCourseIndex(btn.dataset.course)));
      });
      document.querySelectorAll("[data-home]").forEach(btn => {
        btn.addEventListener("click", () => go(btn.dataset.home === "cover" ? 0 : 1));
      });
      document.querySelectorAll("[data-course-hole]").forEach(btn => {
        const [course, hole] = btn.dataset.courseHole.split(":");
        btn.addEventListener("click", () => go(findCourseHoleIndex(course, Number(hole))));
      });
      document.querySelectorAll("[data-tab]").forEach(btn => {
        btn.addEventListener("click", () => {
          const [holeNo, tab] = btn.dataset.tab.split(":");
          tabs.set(`Oak-${holeNo}`, tab);
          render();
        });
      });
    }

    function go(next) {
      current = Math.max(0, Math.min(slides.length - 1, next));
      render();
    }

    prevBtn.addEventListener("click", () => go(current - 1));
    nextBtn.addEventListener("click", () => go(current + 1));

    let startX = 0;
    let startY = 0;
    deck.addEventListener("touchstart", event => {
      startX = event.touches[0].clientX;
      startY = event.touches[0].clientY;
    }, { passive: true });

    deck.addEventListener("touchend", event => {
      const dx = event.changedTouches[0].clientX - startX;
      const dy = event.changedTouches[0].clientY - startY;
      if (Math.abs(dx) > 54 && Math.abs(dx) > Math.abs(dy) * 1.4) {
        go(current + (dx < 0 ? 1 : -1));
      }
    }, { passive: true });

    window.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") go(current - 1);
      if (event.key === "ArrowRight") go(current + 1);
    });

    render();
  </script>
  <script src="app.js"></script>
</body>
</html>
